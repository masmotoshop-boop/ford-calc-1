<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ford Calculator PRO</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div id="appUI" class="app">

  <div class="header">
    <div class="title">🚗 Báo giá lăn bánh</div>
    <div class="subtitle">Ford Việt Nam</div>
  </div>

  <div class="card">

    <label>Dòng xe</label>
    <select id="car"></select>

    <label>Phiên bản</label>
    <select id="version"></select>

    <label>Khu vực</label>
    <select id="area"></select>

    <label>Phí dịch vụ</label>
    <input type="range" id="serviceRange">

    <div class="checkbox">
      <input type="checkbox" id="colorFee">
      <span>Chênh lệch màu (+8.000.000)</span>
    </div>

    <button id="calcBtn">TÍNH GIÁ</button>
    <button id="pdfBtn" class="btn-dark">XUẤT PDF</button>

  </div>

  <div class="card result">

    <div class="car-name" id="selectedCar">---</div>

    <div class="row"><span>Giá niêm yết</span><span id="price"></span></div>
    <div class="row discount"><span>Khuyến mãi</span><span id="promo"></span></div>
    <div class="row final"><span>Sau giảm</span><span id="finalPrice"></span></div>

    <div class="divider"></div>

    <div class="row"><span>Thuế</span><span id="tax"></span></div>
    <div class="row"><span>Biển</span><span id="plate"></span></div>
    <div class="row"><span>Đăng kiểm</span><span id="registration"></span></div>
    <div class="row"><span>Đường bộ</span><span id="roadFee"></span></div>
    <div class="row"><span>Bảo hiểm</span><span id="insurance"></span></div>
    <div class="row"><span>Dịch vụ</span><span id="serviceFee"></span></div>

    <div class="total">
      <span>TỔNG LĂN BÁNH</span>
      <span id="total"></span>
    </div>

  </div>

  <div class="card">

    <div class="section-title">VAY & THANH TOÁN</div>

    <input type="range" id="loanRange">

    <div class="row"><span>Tỷ lệ vay</span><span id="loanPercent"></span></div>
    <div class="row"><span>Tiền vay</span><span id="loanAmount"></span></div>
    <div class="row"><span>Chi phí</span><span id="costs"></span></div>
    <div class="row"><span>Vốn</span><span id="equity"></span></div>

    <!-- 🔥 TRẢ TRƯỚC -->
    <div class="payment-box">
      <div>TRẢ TRƯỚC</div>
      <div id="totalPayment">0</div>
    </div>

  </div>

</div>

<!-- PDF -->
<div id="pdfUI">

  <div class="pdf-container">

    <h2 id="pdfCar">FORD</h2>

    <div class="pdf-row"><span>Giá</span><span id="pdfPrice"></span></div>
    <div class="pdf-row"><span>Giảm</span><span id="pdfPromo"></span></div>
    <div class="pdf-row highlight"><span>Sau giảm</span><span id="pdfFinal"></span></div>

    <hr>

    <div class="pdf-row"><span>Thuế</span><span id="pdfTax"></span></div>
    <div class="pdf-row"><span>Biển</span><span id="pdfPlate"></span></div>
    <div class="pdf-row"><span>Chi phí khác</span><span id="pdfOther"></span></div>

    <div class="pdf-total">
      <span>TỔNG</span>
      <span id="pdfTotal"></span>
    </div>

    <div class="pdf-highlight">
      TRẢ TRƯỚC: <span id="pdfPayment"></span>
    </div>

  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
